name: macos-install

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  brew-install:
    runs-on: macos-latest

    steps:
      - name: Install ariaflow-server via Homebrew tap
        run: |
          brew tap bonomani/ariaflow-server
          brew install ariaflow-server

      - name: Verify CLI
        run: |
          ariaflow-server --version
          ariaflow-server --help

